<style>
/* Corporate navbar — inspired by CrowdStrike/SentinelOne */
.navbar {
  background: #0a0a0a !important;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 0 !important;
  font-size: 0.85rem;
  min-height: 60px;
}
.navbar-container { height: 60px; }
.navbar-brand-container { display: flex; align-items: center; }
.navbar-brand { display: flex; align-items: center; gap: 0.5rem; }
.navbar-brand .navbar-title {
  color: #FFFFFF;
  font-weight: 700;
  font-size: 1.15rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-family: 'Source Code Pro', monospace;
}
.navbar-brand .brand-dot { color: #81BD4A; }

/* Nav links — normal case like CrowdStrike, not uppercase */
.navbar .nav-link {
  color: rgba(255,255,255,0.7) !important;
  font-size: 0.85rem !important;
  font-weight: 400;
  padding: 0.5rem 0.9rem !important;
  transition: color 0.15s;
}
.navbar .nav-link:hover { color: #fff !important; }
.navbar .nav-link.active { color: #81BD4A !important; }

/* CTA button in navbar — like SentinelOne "Get Started" */
.navbar .navbar-cta {
  display: inline-block;
  padding: 0.4rem 1.25rem;
  background: #81BD4A;
  color: #fff !important;
  border-radius: 980px;
  font-size: 0.8rem !important;
  font-weight: 600;
  text-decoration: none;
  transition: background 0.15s;
  margin-left: 0.5rem;
}
.navbar .navbar-cta:hover { background: #6BA33A; color: #fff !important; text-decoration: none; }

/* Dropdowns */
.navbar .dropdown-menu {
  background: #0a0a0a;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 0.5rem;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
.navbar .dropdown-item {
  color: rgba(255,255,255,0.7);
  font-size: 0.83rem;
  border-radius: 6px;
  padding: 0.45rem 0.85rem;
}
.navbar .dropdown-item:hover {
  background: rgba(129,189,74,0.08);
  color: #81BD4A;
}

/* Search + theme toggle */
.navbar .quarto-navigation-tool, .navbar .quarto-color-scheme-toggle { color: rgba(255,255,255,0.4) !important; }
.navbar .quarto-navigation-tool:hover, .navbar .quarto-color-scheme-toggle:hover { color: #81BD4A !important; }

/* Mobile */
@media (max-width: 991px) {
  .navbar .nav-link { font-size: 0.82rem !important; }
}
@media (max-width: 767.98px) {
  .navbar-brand .navbar-title { font-size: 1rem; }
  .navbar .navbar-collapse {
    background: #0a0a0a;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 1rem;
    margin-top: 0.5rem;
  }
  .navbar .navbar-cta { display: block; text-align: center; margin: 0.75rem 0 0; }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var navbarBrand = document.querySelector('.navbar-brand');
  if (navbarBrand) {
    var titleSpan = document.createElement('span');
    titleSpan.className = 'navbar-title';
    titleSpan.textContent = 'CHEN';
    var dot = document.createElement('span');
    dot.className = 'brand-dot';
    dot.textContent = '.';
    var ist = document.createTextNode('IST');
    titleSpan.appendChild(dot);
    titleSpan.appendChild(ist);
    navbarBrand.appendChild(titleSpan);
  }

  // Add CTA button to navbar (language-aware)
  var navRight = document.querySelector('.navbar-nav.ms-auto');
  if (navRight) {
    var langPrefix = '';
    var langMatch = window.location.pathname.match(/^\/(ro|sv|de)\//);
    if (langMatch) langPrefix = '/' + langMatch[1];
    var ctaLi = document.createElement('li');
    ctaLi.className = 'nav-item';
    var ctaLink = document.createElement('a');
    ctaLink.className = 'nav-link navbar-cta';
    ctaLink.href = langPrefix + '/booking/';
    var ctaLabels = { ro: 'Programează', sv: 'Boka Samtal', de: 'Gespräch Buchen' };
    ctaLink.textContent = langMatch ? (ctaLabels[langMatch[1]] || 'Book a Call') : 'Book a Call';
    ctaLi.appendChild(ctaLink);
    navRight.appendChild(ctaLi);
  }
});
</script>

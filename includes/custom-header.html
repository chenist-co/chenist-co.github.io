<style>
/* Corporate navbar — solid dark, structured, professional */
.navbar {
  background: #0a0a0a !important;
  border-bottom: 1px solid rgba(129,189,74,0.15);
  padding: 0 !important;
  font-size: 0.82rem;
  min-height: 56px;
}
.navbar-container {
  display: flex;
  align-items: center;
  height: 56px;
}
.navbar-brand-container { display: flex; align-items: center; }
.navbar-brand { display: flex; align-items: center; gap: 0.5rem; }
.navbar-brand .navbar-title {
  display: inline-block;
  color: #FFFFFF;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-family: 'Source Code Pro', monospace;
}
.navbar-brand .brand-dot { color: #81BD4A; }
.navbar .nav-link {
  color: rgba(255,255,255,0.65) !important;
  font-size: 0.78rem !important;
  font-weight: 500;
  padding: 0.5rem 0.85rem !important;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  transition: color 0.15s;
}
.navbar .nav-link:hover,
.navbar .nav-link.active { color: #81BD4A !important; }
.navbar .dropdown-menu {
  background: #0a0a0a;
  border: 1px solid rgba(129,189,74,0.12);
  border-radius: 8px;
  padding: 0.4rem;
  margin-top: 0;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
.navbar .dropdown-item {
  color: rgba(255,255,255,0.65);
  font-size: 0.78rem;
  font-weight: 500;
  border-radius: 6px;
  padding: 0.45rem 0.85rem;
  letter-spacing: 0.02em;
}
.navbar .dropdown-item:hover {
  background: rgba(129,189,74,0.1);
  color: #81BD4A;
}
.navbar .quarto-navigation-tool { color: rgba(255,255,255,0.5) !important; }
.navbar .quarto-navigation-tool:hover { color: #81BD4A !important; }
.navbar .quarto-color-scheme-toggle { color: rgba(255,255,255,0.5) !important; }
.navbar .quarto-color-scheme-toggle:hover { color: #81BD4A !important; }

@media (max-width: 991px) {
  .navbar .nav-link { font-size: 0.75rem !important; padding: 0.4rem 0.6rem !important; }
}
@media (max-width: 767.98px) {
  .navbar-brand .navbar-title { font-size: 0.9rem; }
  .navbar .navbar-collapse {
    background: #0a0a0a;
    border: 1px solid rgba(129,189,74,0.1);
    border-radius: 8px;
    padding: 1rem;
    margin-top: 0.5rem;
  }
  .navbar .nav-link {
    text-transform: none;
    font-size: 0.85rem !important;
    padding: 0.5rem 0.75rem !important;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var navbarBrand = document.querySelector('.navbar-brand');
  if (navbarBrand) {
    var titleSpan = document.createElement('span');
    titleSpan.className = 'navbar-title';
    titleSpan.textContent = 'CHEN';
    var dot = document.createElement('span');
    dot.className = 'brand-dot';
    dot.textContent = '.';
    var ist = document.createTextNode('IST');
    titleSpan.appendChild(dot);
    titleSpan.appendChild(ist);
    navbarBrand.appendChild(titleSpan);
  }
});
</script>

name = "bigin-bridge"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Deploy: wrangler deploy
# Secrets (set via `wrangler secret put`):
#   BIGIN_CLIENT_ID
#   BIGIN_CLIENT_SECRET
#   BIGIN_REFRESH_TOKEN
#   WEBHOOK_SECRET (optional — for verifying Formspree requests)

[vars]
BIGIN_API_BASE = "https://www.zohoapis.eu/bigin/v2"
BIGIN_AUTH_URL = "https://accounts.zoho.eu/oauth/v2/token"

# Route: api.chen.ist/webhook/*
# Configure in Cloudflare dashboard or via:
# routes = [{ pattern = "api.chen.ist/webhook/*", zone_name = "chen.ist" }]

format:
  html:
    theme:
      light: [flatly, assets/css/light.scss]
      dark: assets/css/dark.scss
    css: [assets/css/main.min.css, assets/css/styles.css, assets/css/modern.css]
    code-link: true
    link-external-icon: true
    link-external-newwindow: true
    smooth-scroll: true
    highlight-style: dracula
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    html-math-method: katex
    from: markdown+raw_html
    include-in-header:
      - text: |
          <script defer data-domain="chen.ist" src="https://plausible.io/js/script.js"></script>
          <link rel="preload" href="/assets/images/stock/network-closeup.webp" as="image" type="image/webp">
          <link rel="preload" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Source+Code+Pro&display=swap" as="style">
          <meta name="view-transition" content="same-origin">
          <noscript><style>.m-s,.m-bg,.m-cta,.m-r,.m-n,.hp-sec,.hp-stats,.ev-card,.ev-past,.m-t{opacity:1!important;transform:none!important;}</style></noscript>
          <link rel="dns-prefetch" href="https://cal.com">
          <link rel="dns-prefetch" href="https://app.cal.com">
          <link rel="preconnect" href="https://cal.com" crossorigin>
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Source+Code+Pro&display=swap" rel="stylesheet">
          <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
          <script type="application/ld+json">
          {
            "@context": "https://schema.org",

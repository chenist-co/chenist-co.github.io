          - href: academy/overview.qmd
            text: Overview
          - href: academy/courses.qmd
            text: Courses
          - href: academy/trainings.qmd
            text: Trainings
          - href: academy/microlearning.qmd
            text: Microlearning
          - href: academy/programs/index.qmd
            text: Programs
            menu:
              - href: academy/programs/hackathons/index.qmd
                text: Hackathons
              - href: academy/programs/summer-school/index.qmd
                text: Summer School
          - href: academy/events.qmd
            text: Events
          - href: academy/webinars.qmd
            text: Webinars
          - href: academy/computerclub.qmd
            text: Computer Club
          - href: academy/partnerships.qmd
            text: Partnerships
      - href: blog.qmd

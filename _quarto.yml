      - file: includes/custom-header.html
    include-after-body:
      - text: |
          <script>
          document.addEventListener('DOMContentLoaded', function() {
            const observer = new IntersectionObserver((entries) => {
              entries.forEach(entry => {
                if (entry.isIntersecting) {
                  entry.target.classList.add('visible');
                }
              });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
            document.querySelectorAll('.m-s, .m-bg, .m-cta, .m-r, .m-n, .hp-sec, .hp-stats, .ev-card, .ev-past, .m-t').forEach(el => observer.observe(el));

            // Breadcrumb + Language bar
            (function() {
              var path = window.location.pathname;
              var currentLang = 'en';
              var cleanPath = path;

              if (path.match(/^\/(ro|de|sv)\//)) {
                currentLang = path.split('/')[1];
                cleanPath = path.replace(/^\/(ro|de|sv)/, '');
              }

              var parts = cleanPath.split('/').filter(function(p) { return p && p !== 'index.html'; });

              var bar = document.createElement('div');
              bar.className = 'path-bar';
              var inner = document.createElement('div');
              inner.className = 'path-bar-inner';

              // Breadcrumbs
              var crumbs = document.createElement('div');
              crumbs.className = 'path-crumbs';
              var homeLink = document.createElement('a');
              homeLink.href = currentLang === 'en' ? '/' : '/' + currentLang + '/';
              homeLink.textContent = 'Home';
              crumbs.appendChild(homeLink);

              var accumulated = currentLang === 'en' ? '' : '/' + currentLang;
              for (var i = 0; i < parts.length; i++) {
                var sep = document.createElement('span');
                sep.className = 'sep';
                sep.textContent = ' \u203A ';
                crumbs.appendChild(sep);
                var name = parts[i].replace('.html', '').replace(/-/g, ' ');
                name = name.charAt(0).toUpperCase() + name.slice(1);
                accumulated += '/' + parts[i];
                if (i === parts.length - 1) {
                  var cur = document.createElement('span');
                  cur.className = 'current';
                  cur.textContent = name;
                  crumbs.appendChild(cur);
                } else {
                  var link = document.createElement('a');
                  link.href = accumulated + '/';
                  link.textContent = name;
                  crumbs.appendChild(link);
                }
              }

              // Language buttons
              var langsDiv = document.createElement('div');
              langsDiv.className = 'path-langs';
              var langs = [
                { code: 'en', label: 'EN', prefix: '' },
                { code: 'ro', label: 'RO', prefix: '/ro' },
                { code: 'sv', label: 'SV', prefix: '/sv' },
                { code: 'de', label: 'DE', prefix: '/de' }
              ];
              for (var j = 0; j < langs.length; j++) {
                var l = langs[j];
                var a = document.createElement('a');
                a.href = l.prefix + (cleanPath || '/');
                a.textContent = l.label;
                if (l.code === currentLang) a.className = 'active';
                langsDiv.appendChild(a);
              }

              inner.appendChild(crumbs);
              inner.appendChild(langsDiv);
              bar.appendChild(inner);

              var header = document.getElementById('quarto-header');
              if (header) {
                header.appendChild(bar);
              }
            })();
          });
          </script>
      - text: |
          <!-- Cal.com floating button -->
          <script>
            (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if(typeof namespace === "string"){cal.ns[namespace] = cal.ns[namespace] || api;p(cal.ns[namespace], ar);p(cal, ["initNamespace", namespace]);} else p(cal, ar); return;} p(cal, ar); }; })(window, "https://app.cal.com/embed/embed.js", "init");
            Cal("init", {origin:"https://cal.com"});
            Cal("floatingButton", {calLink: "chenist", buttonColor: "#81BD4A", buttonTextColor: "#ffffff", buttonText: "Book a Call"});
          </script>
          <script>
            document.addEventListener('DOMContentLoaded', function() {
              // Function to toggle dark/light mode
              function toggleTheme() {
                const currentTheme = document.documentElement.getAttribute('data-bs-theme') || 'light';
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-bs-theme', newTheme);
                localStorage.setItem('quarto-color-scheme', newTheme);
                
                // Update icon if needed
                const themeIcon = document.querySelector('.navbar-nav a[href="#"] i');
                if (themeIcon) {
                  themeIcon.className = newTheme === 'light' ? 'bi bi-moon' : 'bi bi-sun';
                }
              }
              
              // Apply saved theme on load
              const savedTheme = localStorage.getItem('quarto-color-scheme');
              if (savedTheme) {
                document.documentElement.setAttribute('data-bs-theme', savedTheme);
                
                // Update icon to match saved theme
                const themeIcon = document.querySelector('.navbar-nav a[href="#"] i');
                if (themeIcon && savedTheme === 'dark') {
                  themeIcon.className = 'bi bi-sun';
                }
              }
              
              // Set up toggle button
              document.querySelectorAll('a[href="#"]').forEach(function(link) {
                if (link.textContent.includes('Toggle Theme')) {
                  link.addEventListener('click', function(e) {
                    e.preventDefault();
                    toggleTheme();
                  });
                }
              });
              
              // Language switcher — intercept lang dropdown and rewrite to same page
              document.querySelectorAll('.dropdown-item').forEach(function(link) {
                var href = link.getAttribute('href') || '';
                var isLang = false;
                var targetLang = '';

                if (href.match(/^\/?index\.html$/) || href === '/' || href.match(/^\.\.\/?index\.html$/)) {
                  isLang = true; targetLang = 'en';
                } else if (href.match(/\/?ro\//) || href.match(/^\.\.\/ro\//)) {
                  isLang = true; targetLang = 'ro';
                } else if (href.match(/\/?sv\//) || href.match(/^\.\.\/sv\//)) {
                  isLang = true; targetLang = 'sv';
                } else if (href.match(/\/?de\//) || href.match(/^\.\.\/de\//)) {
                  isLang = true; targetLang = 'de';
                }

                var text = (link.textContent || '').trim();
                if (text === 'English' || text === 'Română' || text === 'Svenska' || text === 'Deutsch') {
                  isLang = true;
                  if (text === 'English') targetLang = 'en';
                  if (text === 'Română') targetLang = 'ro';
                  if (text === 'Svenska') targetLang = 'sv';
                  if (text === 'Deutsch') targetLang = 'de';
                }

                if (!isLang) return;

                link.addEventListener('click', function(e) {
                  e.preventDefault();
                  var path = window.location.pathname;
                  var cleanPath = path.replace(/^\/(ro|de|sv)\//, '/').replace(/^\/(ro|de|sv)$/, '/');

                  var newPath;
                  if (targetLang === 'en') {
                    newPath = cleanPath;
                  } else {
                    newPath = '/' + (targetLang === 'sv' ? 'sv' : targetLang) + (cleanPath === '/' ? '/' : cleanPath);
                  }

                  window.location.href = newPath;
                });
              });

              // Enable Bootstrap tooltips
              var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
              var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl);
              });
              
              // Smooth scroll for anchor links
              document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                if (anchor.getAttribute('href') === '#') return;
                
                anchor.addEventListener('click', function(e) {
                  e.preventDefault();
                  const target = document.querySelector(this.getAttribute('href'));
                  if (target) {
                    window.scrollTo({
                      top: target.offsetTop - 70,
                      behavior: 'smooth'
                    });
                  }
                });
              });
            });
          </script>
      - file: includes/custom-footer.html

editor: visual


format:
  html:
    theme:
      light: [flatly, assets/css/light.scss]
      dark: assets/css/dark.scss
    css: [assets/css/styles.css, assets/css/academy.scss, assets/css/custom-hero.css, assets/css/landing-pages.css, assets/css/modern.css]
    code-link: true
    link-external-icon: true
    link-external-newwindow: true
    smooth-scroll: true
    highlight-style: dracula
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    html-math-method: katex
    from: markdown+raw_html
    include-in-header:
      - text: |
          <script defer data-domain="chen.ist" src="https://plausible.io/js/script.js"></script>
          <link rel="preconnect" href="https://fonts.googleapis.com">

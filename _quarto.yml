          - href: about/index.qmd
            text: About
          - href: about/csr.qmd
            text: CSR
          - href: about/community.qmd
            text: Community
      - href: contact.qmd
        text: Contact
      - text: "🌐"
        menu:
          - text: English
            href: index.qmd
          - text: Română
            href: ro/index.qmd
          - text: Svenska
            href: sv/index.qmd
          - text: Deutsch
            href: de/index.qmd
        
  page-footer:
    border: false
    background: "transparent"
    left: ""
    center: ""
